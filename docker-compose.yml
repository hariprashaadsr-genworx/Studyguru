services:

  postgres:
    image: postgres:15
    container_name: studyguru_postgres
    restart: always
    environment:
      POSTGRES_USER: studyguru
      POSTGRES_PASSWORD: studyguru
      POSTGRES_DB: studyguru_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth:
    build:
      context: ./auth
    container_name: studyguru_auth
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg://studyguru:studyguru@postgres:5432/studyguru_db
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
    container_name: studyguru_backend
    restart: always
    depends_on:
      - postgres
      - auth
    environment:
      DATABASE_URL: postgresql+psycopg://studyguru:studyguru@postgres:5432/studyguru_db
      AUTH_SERVICE_URL: http://auth:8001
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: studyguru_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata: